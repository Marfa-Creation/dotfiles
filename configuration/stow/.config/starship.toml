format = """
[Óāī](bg:#7aa2f7 fg:#c0caf5)\
$directory\
[Óāī](fg:#7aa2f7 bg:#414868)\
$git_branch\
$git_status\
[Óāī](fg:#414868 bg:#24283b)\
$rust\
[Óāī](fg:#24283b bg:#1d2230)\
[Óāī ](fg:#1d2230)\
\n$character"""

[directory]
style = "fg:#f7f7f7 bg:#7aa2f7"
format = "[ $path ]($style)"
truncation_length = 8
truncate_to_repo = false
truncation_symbol = "../"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "

[git_branch]
symbol = "Ôźė"
style = "bg:#414868"
format = '[[ $symbol $branch ](fg:#c0caf5 bg:#414868)]($style)'

[git_status]
style = "bg:#414868"
format = '[[($all_status$ahead_behind )](fg:#c0caf5 bg:#414868)]($style)'

[rust]
symbol = "Óě®"
style = "bg:#24283b"
format = '[[ $symbol ($version) ](fg:#c0caf5 bg:#24283b)]($style)'
